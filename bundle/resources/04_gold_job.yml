# =========================================================
# FASE 04 · GOLD PIPELINE
# Silver → Gold: agregações analíticas + feature store
# Ordem:
#   01_top_scorers     → depende de silver.player_match_stats
#   02_team_style      → depende de silver.team_performance
#   03_match_features  → depende de player_stats + team_performance + elo
#   03_match_features_v2 → versão melhorada (depende de 03)
#   04_standings       → depende de team_performance (pode paralelo com 01/02)
# =========================================================

resources:
  jobs:
    wc_gold_pipeline:
      name: "WC 2026 · 04 · Gold — Agregações Analíticas e Feature Store"
      description: >
        Constrói a camada Gold: artilharia, estilo de jogo, feature store para ML
        e tabela de classificação. Pré-requisito: wc_silver_pipeline concluído.

      tags:
        layer: gold
        project: wc-data-platform-2026

      email_notifications:
        on_failure:
          - ${var.ALERT_EMAIL}
        no_alert_for_skipped_runs: true

      job_clusters:
        - job_cluster_key: gold_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type}
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
              spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"
            custom_tags:
              layer: gold
              project: wc-data-platform-2026

      tasks:
        # ── Task 1: Top Scorers (artilharia + xG acumulado) ──────────────────
        - task_key: gold_01_top_scorers
          description: "Artilharia: gols reais + xG acumulado por torneio → gold.top_scorers"
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ../notebooks/gold/01_gold_top_scorers.py
            base_parameters:
              catalog: ${var.catalog}

        # ── Task 2: Team Style Index ──────────────────────────────────────────
        - task_key: gold_02_team_style
          description: "Pressing, posse, PPDA, profundidade → gold.team_style_index"
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ../notebooks/gold/02_gold_team_style.py
            base_parameters:
              catalog: ${var.catalog}

        # ── Task 3: Match Features (feature store principal para ML) ──────────
        - task_key: gold_03_match_features
          description: "Feature store completa para modelos ML → gold.match_features"
          depends_on:
            - task_key: gold_01_top_scorers
            - task_key: gold_02_team_style
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ../notebooks/gold/03_gold_match_features.py
            base_parameters:
              catalog: ${var.catalog}

        # ── Task 3b: Match Features v2 (versão aprimorada) ───────────────────
        - task_key: gold_03b_match_features_v2
          description: "Feature store v2 com features adicionais → gold.match_features_v2"
          depends_on:
            - task_key: gold_03_match_features
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ../notebooks/gold/03_gold_match_features_v2.py
            base_parameters:
              catalog: ${var.catalog}

        # ── Task 4: Standings (tabela de classificação) ───────────────────────
        - task_key: gold_04_standings
          description: "Tabela de classificação por fase e competição → gold.standings"
          depends_on:
            - task_key: gold_02_team_style
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ../notebooks/gold/04_gold_standings.py
            base_parameters:
              catalog: ${var.catalog}
